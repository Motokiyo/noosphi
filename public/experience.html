<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0B0E14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Noosfeerique</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/experience.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <span class="header-title">Noosfeerique</span>
    <nav class="header-icons">
      <!-- Hamburger -->
      <button class="header-icon" id="btn-menu" aria-label="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <!-- Settings -->
      <button class="header-icon" id="btn-settings" aria-label="Parametres">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <!-- Help -->
      <button class="header-icon" id="btn-help" aria-label="A propos">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
    </nav>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Sources</span>
      <button class="sidebar-close" id="sidebar-close" aria-label="Fermer"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></button>
    </div>
    <div class="sidebar-sources">
      <label class="source-option active" data-source="combined">
        <input type="radio" name="source" value="combined" checked>
        <span class="source-radio"></span>
        <span class="source-info">
          <span class="source-name">Combine</span>
          <span class="source-origin">Toutes sources (Stouffer)</span>
        </span>
        <span class="source-z" id="sidebar-z-combined">--</span>
      </label>
      <label class="source-option" data-source="local">
        <input type="radio" name="source" value="local">
        <span class="source-radio"></span>
        <span class="source-info">
          <span class="source-name">Mon appareil</span>
          <span class="source-origin">RNG local (navigateur)</span>
        </span>
        <span class="source-z" id="sidebar-z-local">--</span>
      </label>
      <label class="source-option" data-source="gcp">
        <input type="radio" name="source" value="gcp">
        <span class="source-radio"></span>
        <span class="source-info">
          <span class="source-name">Mondial</span>
          <span class="source-origin">Princeton, USA (~60 EGGs)</span>
        </span>
        <span class="source-z" id="sidebar-z-gcp">--</span>
      </label>
      <label class="source-option" data-source="qrng">
        <input type="radio" name="source" value="qrng">
        <span class="source-radio"></span>
        <span class="source-info">
          <span class="source-name">Quantique</span>
          <span class="source-origin">ANU, Australie (photonique)</span>
        </span>
        <span class="source-z" id="sidebar-z-qrng">--</span>
      </label>
      <label class="source-option" data-source="nist">
        <input type="radio" name="source" value="nist">
        <span class="source-radio"></span>
        <span class="source-info">
          <span class="source-name">NIST Beacon</span>
          <span class="source-origin">Gouvernement US</span>
        </span>
        <span class="source-z" id="sidebar-z-nist">--</span>
      </label>
      <label class="source-option" data-source="qci">
        <input type="radio" name="source" value="qci">
        <span class="source-radio"></span>
        <span class="source-info">
          <span class="source-name">QCI uQRNG</span>
          <span class="source-origin">Photonique cloud (USA)</span>
        </span>
        <span class="source-z" id="sidebar-z-qci">--</span>
      </label>
    </div>
    <div class="sidebar-footer">
      <a href="/" class="sidebar-link">Dashboard</a>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- Settings panel -->
  <aside class="settings-panel" id="settings-panel">
    <div class="sidebar-header">
      <span class="sidebar-title">Parametres</span>
      <button class="sidebar-close" id="settings-close" aria-label="Fermer"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Gamme sonore</div>
      <div class="settings-section-subtitle">Accordage La = 432 Hz</div>
      <div class="scale-options">
        <label class="scale-option active" data-scale="free">
          <input type="radio" name="scale" value="free" checked>
          <span class="source-radio"></span>
          <span class="scale-info">
            <span class="scale-name">Libre</span>
            <span class="scale-desc">Balayage continu, tous les Hz</span>
          </span>
        </label>
        <label class="scale-option" data-scale="pentatonic">
          <input type="radio" name="scale" value="pentatonic">
          <span class="source-radio"></span>
          <span class="scale-info">
            <span class="scale-name">Pentatonique</span>
            <span class="scale-desc">5 notes — universelle, meditative</span>
          </span>
        </label>
        <label class="scale-option" data-scale="major">
          <input type="radio" name="scale" value="major">
          <span class="source-radio"></span>
          <span class="scale-info">
            <span class="scale-name">Majeure</span>
            <span class="scale-desc">7 notes — lumineuse</span>
          </span>
        </label>
        <label class="scale-option" data-scale="minor">
          <input type="radio" name="scale" value="minor">
          <span class="source-radio"></span>
          <span class="scale-info">
            <span class="scale-name">Mineure</span>
            <span class="scale-desc">7 notes — contemplative</span>
          </span>
        </label>
        <label class="scale-option" data-scale="dorian">
          <input type="radio" name="scale" value="dorian">
          <span class="source-radio"></span>
          <span class="scale-info">
            <span class="scale-name">Dorienne</span>
            <span class="scale-desc">7 notes — modale, mystique</span>
          </span>
        </label>
        <label class="scale-option" data-scale="chromatic">
          <input type="radio" name="scale" value="chromatic">
          <span class="source-radio"></span>
          <span class="scale-info">
            <span class="scale-name">Chromatique</span>
            <span class="scale-desc">12 notes — toutes les demi-tons</span>
          </span>
        </label>
      </div>
    </div>
  </aside>
  <div class="settings-backdrop" id="settings-backdrop"></div>

  <!-- Three.js canvas -->
  <canvas id="sphere-canvas"></canvas>

  <!-- Z-score display -->
  <div class="z-indicator">
    <span class="z-value" id="z-display">--</span>
    <span class="z-label">z-score</span>
  </div>

  <!-- Bottom-right controls -->
  <div class="bottom-controls">
    <button class="control-btn" id="btn-session" aria-label="Session">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </button>
    <button class="control-btn" id="btn-graph" aria-label="Graphiques">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </button>
    <div class="audio-indicator" id="audio-indicator">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </div>
  </div>

  <!-- Session overlay (transparent over sphere) -->
  <div class="session-overlay" id="session-overlay">
    <div class="session-header">
      <span class="session-title">Session</span>
      <div class="session-header-right">
        <button class="graph-toggle-btn" id="btn-session-history" aria-label="Sessions enregistrees">
          <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z" fill="none"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        </button>
        <button class="graph-close" id="session-close" aria-label="Fermer">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </button>
      </div>
    </div>

    <!-- Session setup (before recording) -->
    <div class="session-setup" id="session-setup">
      <button class="session-history-btn" id="btn-session-history-main">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 3h18v18H3z" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="3" x2="9" y2="21" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Sessions enregistrees</span>
      </button>
      <input type="text" class="session-name-input" id="session-name" placeholder="Nommez votre session..." maxlength="100">
      <button class="session-record-btn" id="btn-start-session">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg>
        <span>Session solo</span>
      </button>
      <div class="collective-divider"><span>ou</span></div>
      <button class="session-record-btn collective-btn" id="btn-create-collective">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Session collective</span>
      </button>
      <div class="collective-join">
        <input type="text" class="session-name-input" id="collective-code" placeholder="Code de session (ex: NOOS-ABCD)" maxlength="9" style="text-transform:uppercase">
        <button class="session-record-btn" id="btn-join-collective">
          <span>Rejoindre</span>
        </button>
      </div>
      <div class="collective-status hidden" id="collective-status"></div>
    </div>

    <!-- Session recording (during) -->
    <div class="session-recording hidden" id="session-recording">
      <!-- TOP: info bar + toggles with drawer -->
      <div class="session-info-bar">
        <span class="session-rec-dot"></span>
        <span class="session-rec-name" id="session-rec-name"></span>
        <span class="session-participants hidden" id="session-participants"></span>
        <button class="session-copy-code hidden" id="btn-copy-code" aria-label="Copier le code">
          <svg viewBox="0 0 24 24" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="session-copy-code hidden" id="btn-share-code" aria-label="Partager">
          <svg viewBox="0 0 24 24" width="14" height="14"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="graph-toggle-btn" id="btn-session-toggle-sources" aria-label="Sources">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <span class="session-rec-timer" id="session-rec-timer">00:00</span>
      </div>
      <div class="session-toggles collapsed" id="session-toggles">
        <label class="graph-toggle active" data-key="combined">
          <input type="checkbox" checked><span class="toggle-swatch" style="background:#CC44FF"></span><span>Combine</span>
        </label>
        <label class="graph-toggle active" data-key="local">
          <input type="checkbox" checked><span class="toggle-swatch" style="background:#00E5FF"></span><span>Local</span>
        </label>
        <label class="graph-toggle active" data-key="gcp">
          <input type="checkbox" checked><span class="toggle-swatch" style="background:#6C63FF"></span><span>Princeton</span>
        </label>
        <label class="graph-toggle active" data-key="qrng">
          <input type="checkbox" checked><span class="toggle-swatch" style="background:#FF8800"></span><span>ANU</span>
        </label>
        <label class="graph-toggle active" data-key="nist">
          <input type="checkbox" checked><span class="toggle-swatch" style="background:#00CC66"></span><span>NIST</span>
        </label>
        <label class="graph-toggle active" data-key="qci">
          <input type="checkbox" checked><span class="toggle-swatch" style="background:#C9A24D"></span><span>QCI</span>
        </label>
      </div>

      <!-- CENTER: z-score (sphere visible behind) -->
      <div class="session-center-z">
        <span class="session-center-z-value" id="session-z-value">--</span>
        <span class="live-z-label">z-score</span>
        <span class="session-z-max" id="session-z-max">max: --</span>
      </div>

      <!-- BOTTOM: graph + controls -->
      <div class="graph-container session-chart-container">
        <canvas id="chart-session"></canvas>
      </div>
      <div class="session-controls">
        <button class="session-pause-btn" id="btn-pause-session">
          <svg viewBox="0 0 24 24" id="pause-icon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span id="pause-label">Pause</span>
        </button>
        <button class="session-stop-btn" id="btn-stop-session">
          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          <span>Arreter</span>
        </button>
      </div>
    </div>
    <div class="session-audio-fixed" id="btn-session-audio">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </div>
  </div>

  <!-- Saved sessions list overlay -->
  <div class="sessions-list-overlay" id="sessions-list-overlay">
    <div class="session-header">
      <span class="session-title">Sessions enregistrees</span>
      <button class="graph-close" id="sessions-list-close" aria-label="Fermer">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </button>
    </div>
    <div class="sessions-list" id="sessions-list">
      <div class="highlight-empty">Aucune session enregistree</div>
    </div>
  </div>

  <!-- Session detail overlay -->
  <div class="session-detail-overlay" id="session-detail-overlay">
    <div class="session-header">
      <span class="session-title" id="detail-title">Session</span>
      <button class="graph-close" id="session-detail-close" aria-label="Fermer">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </button>
    </div>
    <div class="session-detail-content" id="session-detail-content"></div>
  </div>

  <!-- Graph overlay -->
  <div class="graph-overlay" id="graph-overlay">
    <div class="graph-header">
      <span class="graph-title">Historique</span>
      <div class="graph-header-right">
        <button class="graph-toggle-btn" id="btn-toggle-sources" aria-label="Sources">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button class="graph-toggle-btn" id="btn-clear-history" aria-label="Effacer">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
        <button class="graph-close" id="graph-close" aria-label="Fermer">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </button>
      </div>
    </div>

    <div class="graph-toggles collapsed" id="graph-toggles">
      <label class="graph-toggle active" data-key="combined">
        <input type="checkbox" checked>
        <span class="toggle-swatch" style="background:#CC44FF"></span>
        <span>Combine</span>
      </label>
      <label class="graph-toggle active" data-key="local">
        <input type="checkbox" checked>
        <span class="toggle-swatch" style="background:#00E5FF"></span>
        <span>Local</span>
      </label>
      <label class="graph-toggle active" data-key="gcp">
        <input type="checkbox" checked>
        <span class="toggle-swatch" style="background:#6C63FF"></span>
        <span>Princeton</span>
      </label>
      <label class="graph-toggle active" data-key="qrng">
        <input type="checkbox" checked>
        <span class="toggle-swatch" style="background:#FF8800"></span>
        <span>ANU</span>
      </label>
      <label class="graph-toggle active" data-key="nist">
        <input type="checkbox" checked>
        <span class="toggle-swatch" style="background:#00CC66"></span>
        <span>NIST</span>
      </label>
      <label class="graph-toggle active" data-key="qci">
        <input type="checkbox" checked>
        <span class="toggle-swatch" style="background:#C9A24D"></span>
        <span>QCI</span>
      </label>
    </div>

    <div class="graph-highlights" id="graph-highlights">
      <div class="highlights-title">Coherences marquantes</div>
      <div class="highlights-list" id="highlights-list">
        <div class="highlight-empty">En attente de donnees...</div>
      </div>
    </div>

    <div class="graph-live-z">
      <span class="live-z-value" id="graph-z-value">--</span>
      <span class="live-z-label">z-score</span>
      <div class="live-z-sources" id="graph-z-sources"></div>
    </div>

    <div class="graph-container">
      <canvas id="chart-history"></canvas>
    </div>
  </div>

  <!-- Source dots -->
  <div class="sources-status" id="sources-status">
    <div class="source-dot" title="Local RNG"></div>
    <div class="source-dot" title="GCP"></div>
    <div class="source-dot" title="ANU QRNG"></div>
    <div class="source-dot" title="NIST Beacon"></div>
    <div class="source-dot" title="QCI uQRNG"></div>
  </div>

  <!-- Loading -->
  <div class="loading-text" id="loading-text">Initialisation...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/zindex.js"></script>
  <script type="module" src="js/experience.js"></script>
</body>
</html>
